{
  "manifest_version": 3,
  "name": "CRYPT0 Realm X",
  "version": "2.0",
  "description": "Unlimited Netflix & Spotify Cookie Injector + ShadowFlix PH Streaming Platform",
  "permissions": [
    "storage",
    "declarativeNetRequest",
    "tabs",
    "scripting",
    "activeTab",
	"webNavigation"
  ],
  "host_permissions": [
    "*://*.netflix.com/*",
    "*://*.open.spotify.com/*"
  ],
  "background": {
    "service_worker": "background.js"
  },
  "action": {
    "default_popup": "popup.html",
    "default_icon": {
      "16": "icons/icons16.png",
      "32": "icons/icons32.png",
      "48": "icons/icons48.png",
      "128": "icons/icons128.png"
    }
  },
  "content_scripts": [
    {
      "matches": [
        "*://*.netflix.com/*",
        "*://*.open.spotify.com/*"
      ],
      "js": ["content_inject.js"],
      "run_at": "document_start"
    }
  ],
  "icons": {
    "16": "icons/icons16.png",
    "32": "icons/icons32.png",
    "48": "icons/icons48.png",
    "128": "icons/icons128.png"
  }
}
